<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاكاة Webserv — سامي vs كريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #11141a;
  --surface2: #181c24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --green: #00e5a0;
  --green-dim: rgba(0,229,160,0.08);
  --green-mid: rgba(0,229,160,0.18);
  --red: #ff4d6a;
  --red-dim: rgba(255,77,106,0.08);
  --red-mid: rgba(255,77,106,0.18);
  --amber: #ffb547;
  --amber-dim: rgba(255,181,71,0.08);
  --blue: #4d9fff;
  --text: #e8eaf0;
  --text2: #7c8399;
  --text3: #4a5068;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Tajawal', sans-serif;
  --radius: 12px;
  --radius-sm: 7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid noise bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

/* ── HEADER ── */
.hero {
  text-align: center;
  padding: 56px 0 48px;
  position: relative;
}
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  border: 1px solid var(--green-mid);
  background: var(--green-dim);
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  margin-bottom: 24px;
}
.hero-tag span { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.hero h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 14px;
}
.hero h1 em { font-style: normal; color: var(--green); }
.hero h1 s { text-decoration-color: var(--red); text-decoration-thickness: 2px; color: var(--red); }
.hero-sub { color: var(--text2); font-size: 15px; max-width: 500px; margin: 0 auto 36px; }

/* ── SCENE NAV ── */
.scene-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 40px;
}
.snav-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 7px;
}
.snav-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.snav-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.snav-btn .snum {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
}
.snav-btn.active .snum { background: var(--green); color: var(--bg); }

/* ── ARENA ── */
.arena {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 680px) { .arena { grid-template-columns: 1fr; } }

.fighter-col {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.fighter-col.good { border-color: rgba(0,229,160,0.2); }
.fighter-col.bad  { border-color: rgba(255,77,106,0.2); }

.fighter-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.fighter-col.good .fighter-header { background: var(--green-dim); }
.fighter-col.bad  .fighter-header { background: var(--red-dim); }

.fighter-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px;
  flex-shrink: 0;
}
.fighter-col.good .fighter-avatar { background: var(--green-mid); color: var(--green); }
.fighter-col.bad  .fighter-avatar { background: var(--red-mid); color: var(--red); }

.fighter-name { font-weight: 700; font-size: 15px; }
.fighter-col.good .fighter-name { color: var(--green); }
.fighter-col.bad  .fighter-name { color: var(--red); }
.fighter-role { font-size: 11px; color: var(--text2); font-family: var(--mono); }

.fighter-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 12px; }

/* ── MESSAGES ── */
.msg {
  border-radius: var(--radius-sm);
  padding: 12px 15px;
  font-size: 13.5px;
  line-height: 1.65;
  animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes msgIn {
  from { opacity:0; transform: translateY(10px) scale(0.97); }
  to   { opacity:1; transform: none; }
}

.msg.thought {
  background: var(--surface2);
  border: 1px dashed var(--border2);
  color: var(--text2);
  font-style: italic;
  font-size: 13px;
  display: flex;
  gap: 9px;
}
.msg.thought::before {
  content: '//';
  font-family: var(--mono);
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 1px;
}

.msg.chat-good {
  background: var(--green-dim);
  border: 1px solid rgba(0,229,160,0.15);
  color: var(--text);
}
.msg.chat-bad {
  background: var(--red-dim);
  border: 1px solid rgba(255,77,106,0.15);
  color: var(--text);
}

.code {
  background: #0d1117;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.75;
  color: #c9d1d9;
  white-space: pre;
  overflow-x: auto;
  margin: 8px 0 2px;
}
.code .c-green { color: var(--green); }
.code .c-amber { color: var(--amber); }
.code .c-blue  { color: var(--blue); }
.code .c-red   { color: var(--red); }
.code .c-gray  { color: var(--text3); }

.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 0.03em;
}
.tag-ok   { background: var(--green-mid); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }
.tag-warn { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,181,71,0.3); }
.tag-err  { background: var(--red-mid);   color: var(--red);   border: 1px solid rgba(255,77,106,0.3); }

/* ── OUTCOME BAR ── */
.outcome-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 4px;
}
@media (max-width: 680px) { .outcome-bar { grid-template-columns: 1fr; } }

.outcome-card {
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  animation: msgIn 0.4s ease both;
}
.outcome-card.good { background: var(--green-dim); border: 1px solid rgba(0,229,160,0.25); }
.outcome-card.bad  { background: var(--red-dim);   border: 1px solid rgba(255,77,106,0.25); }

.outcome-icon {
  font-size: 22px;
  flex-shrink: 0;
  margin-top: 2px;
}
.outcome-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
}
.outcome-card.good .outcome-title { color: var(--green); }
.outcome-card.bad  .outcome-title { color: var(--red); }
.outcome-body { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ── SCENE WRAPPER ── */
.scene { display: none; }
.scene.active { display: block; animation: fadeScene 0.3s ease; }
@keyframes fadeScene { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.scene-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.scene-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  padding: 3px 11px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}
.scene-title { font-size: 17px; font-weight: 700; color: var(--text); }
.scene-desc { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* ── PROGRESS TIMELINE ── */
.timeline {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 32px;
  padding: 0 8px;
}
.tl-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
  cursor: pointer;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.tl-step.done, .tl-step.active { opacity: 1; }
.tl-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  transition: all 0.3s;
  z-index: 1;
  position: relative;
}
.tl-step.active .tl-dot { border-color: var(--green); background: var(--green); color: var(--bg); }
.tl-step.done   .tl-dot { border-color: var(--green-mid); background: var(--green-dim); color: var(--green); }
.tl-label { font-size: 10px; color: var(--text2); text-align: center; font-family: var(--mono); white-space: nowrap; }
.tl-step.active .tl-label { color: var(--green); }
.tl-line {
  height: 1px;
  flex: 1;
  background: var(--border2);
  margin-bottom: 20px;
  position: relative;
  top: -1px;
}

/* ── NAV BUTTONS ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 28px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.nav-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.nav-btn.primary { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.scene-counter { font-family: var(--mono); font-size: 12px; color: var(--text3); }

/* ── STAT PILLS ── */
.stat-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 11px;
}
.stat-pill .val { color: var(--text); font-weight: 500; }
.stat-pill .lbl { color: var(--text3); }
.stat-pill.g .val { color: var(--green); }
.stat-pill.r .val { color: var(--red); }
.stat-pill.a .val { color: var(--amber); }

/* ── SCOREBOARD ── */
.scoreboard {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  margin-top: 32px;
}
.sb-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 18px; }
.sb-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.sb-label { font-size: 13px; color: var(--text2); min-width: 130px; }
.sb-bar-wrap { flex: 1; display: flex; gap: 3px; }
.sb-seg {
  height: 8px;
  border-radius: 2px;
  transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-val { font-family: var(--mono); font-size: 11px; min-width: 32px; text-align: left; }

.divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

/* arrow icons */
.arr { display: inline-block; }
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="hero-tag"><span></span> LIVE SIMULATION — WEBSERV</div>
    <h1>سامي <em>يبني</em><br>كريم <s>يتعجّل</s></h1>
    <p class="hero-sub">4 مشاهد حقيقية من مشروع webserv — شاهد كيف يفكر كل مطور ويختلف المصير</p>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- Scenes -->
  <div id="scenes-wrap"></div>

  <!-- Nav -->
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="changeScene(-1)">
      <span>←</span> السابق
    </button>
    <span class="scene-counter" id="scene-counter">1 / 4</span>
    <button class="nav-btn primary" id="btn-next" onclick="changeScene(1)">
      التالي <span>→</span>
    </button>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard" style="display:none">
    <div class="sb-title">// FINAL_SCORE — نهاية المشروع</div>
    <div id="sb-rows"></div>
  </div>

</div>

<script>
const scenes = [
  {
    id: 'parsing',
    num: '01',
    label: 'HTTP Parser',
    title: 'المهمة: بناء HTTP request parser',
    desc: 'نقطة البداية — كيف يتعامل كل مطور مع أول مهمة حقيقية',
    sami: [
      { type: 'thought', text: 'قبل ما أكتب سطر واحد — ما هي كل الحالات الممكنة في HTTP parsing؟' },
      { type: 'msg', text: `أرسم الـ state machine أول، بعدين أكتب الكود:`, code: `<span class="c-gray">// الحالات الممكنة:</span>
<span class="c-amber">REQUEST_LINE</span>  → METHOD SP URI SP VERSION CRLF
<span class="c-amber">HEADERS</span>       → field-name ":" OWS value CRLF  
<span class="c-amber">BODY</span>          → حسب Content-Length / chunked
<span class="c-amber">ERROR</span>         → 400 / 414 / 405 بدل crash`, tags: ['ok:قابل للاختبار', 'ok:قابل للتوسع'] },
      { type: 'msg', text: `كل state له دالة واحدة مسؤولة عنه. لا خلط.`, code: `<span class="c-blue">class</span> <span class="c-green">HttpParser</span> {
  <span class="c-blue">enum</span> State { REQUEST_LINE, HEADERS, BODY, DONE };
  
  <span class="c-green">bool</span> parse(<span class="c-amber">State</span> state, <span class="c-green">Buffer</span>&amp; buf) {
    <span class="c-blue">switch</span>(state) {
      <span class="c-blue">case</span> REQUEST_LINE: <span class="c-blue">return</span> parseRequestLine(buf);
      <span class="c-blue">case</span> HEADERS:      <span class="c-blue">return</span> parseHeaders(buf);
      <span class="c-blue">case</span> BODY:         <span class="c-blue">return</span> parseBody(buf);
    }
  }
};` }
    ],
    karim: [
      { type: 'thought', text: 'سهلة! أقرأ line by line وأقسّم بـ spaces.' },
      { type: 'msg', text: 'مباشرة للكود — بسيط وسريع:', code: `<span class="c-gray">// "حل" سريع في 5 دقائق</span>
std::string line;
std::getline(stream, line);
method = line.substr(0, line.find(<span class="c-red">' '</span>));
uri    = line.substr(line.find(<span class="c-red">' '</span>)+1,
         line.rfind(<span class="c-red">' '</span>));`, tags: ['err:ماذا لو URI فيه space؟', 'err:لا يتعامل مع CRLF'] },
      { type: 'msg', text: 'يشتغل على الـ test البسيط. نكمل!', tags: ['warn:بدون edge cases'] }
    ],
    outcome: {
      good: { icon: '✓', title: 'بعد أسبوع — إضافة chunked encoding', body: 'سامي يضيفها في ساعتين. الـ state machine استوعبها بسلاسة. لا شيء تكسّر.' },
      bad:  { icon: '✗', title: 'بعد أسبوع — crash غريب في production', body: 'كريم يقضي 3 أيام يصلح URIs تحتوي characters خاصة. الكود تحوّل لـ if/else متداخلة.' }
    },
    stats: [
      { lbl: 'وقت التنفيذ', good: '4 ساعات', bad: '2 ساعات', cls: '' },
      { lbl: 'وقت الإصلاح لاحقًا', good: 'صفر', bad: '+3 أيام', cls: '' }
    ]
  },
  {
    id: 'security',
    num: '02',
    label: 'Path Traversal',
    title: 'أزمة: تقرير بثغرة path traversal',
    desc: 'المهاجم يرسل %2E%2E بدل .. — هل يكتشف كل مطور الجذر الحقيقي للمشكلة؟',
    sami: [
      { type: 'thought', text: 'أين بالضبط تمر هذه البيانات؟ أتتبع المسار من الـ request حتى stat().' },
      { type: 'msg', text: 'وجدتها. percentEncoded() تفكّ %2E%2E → .. لكن لا أحد يتحقق من النتيجة النهائية.', tags: ['ok:تشخيص جذري'] },
      { type: 'msg', text: 'الإصلاح الصحيح: تحقق بعد بناء المسار الكامل — سطر واحد:', code: `<span class="c-gray">// بعد createPhysicalPath()</span>
<span class="c-blue">if</span> (resolvedPath.substr(0, root.size()) != root)
  <span class="c-blue">return</span> error.setStatus(<span class="c-red">403</span>, <span class="c-red">"Forbidden"</span>), <span class="c-blue">false</span>;

<span class="c-gray">// يغطي: .. و %2E%2E و ..%2F وكل encoding</span>`, tags: ['ok:حل جذري', 'ok:سطر واحد'] },
      { type: 'msg', text: 'كتبت test يحاكي 8 أنواع من الـ encoding ليمنع التكرار.' }
    ],
    karim: [
      { type: 'thought', text: 'أمنع .. في الـ URI قبل ما يدخل. سريع.' },
      { type: 'msg', text: '"إصلاح" سريع:', code: `<span class="c-gray">// يبدو منطقيًا...</span>
<span class="c-blue">if</span> (uri.find(<span class="c-red">".."</span>) != std::string::npos)
  <span class="c-blue">return</span> <span class="c-red">403</span>;`, tags: ['err:ماذا عن %2E%2E ؟', 'err:ماذا عن ..%2F ؟'] },
      { type: 'msg', text: 'يوم بعدين: تقرير ثانٍ. الثغرة لا تزال تعمل عبر encoding مختلف.', tags: ['err:يبدأ من الصفر'] }
    ],
    outcome: {
      good: { icon: '✓', title: 'وقت الإصلاح الكامل: 3 ساعات', body: 'ساعة تحليل + ساعة كود + ساعة اختبار. لم تظهر مرة ثانية.' },
      bad:  { icon: '✗', title: 'وقت الإصلاح الكامل: 4+ أيام', body: 'محاولات متعددة، كل مرة تظهر حالة جديدة لم يغطِّها. الثغرة لا تزال جزئية.' }
    },
    stats: []
  },
  {
    id: 'cgi',
    num: '03',
    label: 'CGI Feature',
    title: 'طلب جديد: دعم CGI للسيرفر',
    desc: 'Feature لم تكن في الخطة — كيف يتعامل كل مطور مع التوسع؟',
    sami: [
      { type: 'thought', text: 'CGI يحتاج: كشف الـ extension، تحديد المسار، تمرير env vars، قراءة output. أين يجلس في الكود الحالي؟' },
      { type: 'msg', text: 'CGI هو طبقة فوق الـ handler الموجود. أضيف نقطة تفتيش واحدة واضحة:', code: `<span class="c-gray">// في handlePath — نقطة واحدة للقرار</span>
<span class="c-blue">if</span> (isCgiRequest(uri, location))

const sbData = [
  { label: 'وقت التطوير', good: 85, bad: 55, unit: '%' },
  { label: 'bugs في الإنتاج', good: 10, bad: 90, unit: '' },
  { label: 'قابلية التوسع', good: 90, bad: 25, unit: '%' },
  { label: 'ثقة في الكود', good: 95, bad: 20, unit: '%' },
  { label: 'نجاح التسليم', good: 100, bad: 0, unit: '%' }
];

let current = 0;

function buildTimeline() {
  const tl = document.getElementById('timeline');
  scenes.forEach((s, i) => {
    if (i > 0) tl.innerHTML += `<div class="tl-line"></div>`;
    tl.innerHTML += `
      <div class="tl-step ${i === 0 ? 'active' : ''}" id="tl-${i}" onclick="gotoScene(${i})">
        <div class="tl-dot">${s.num}</div>
        <div class="tl-label">${s.label}</div>
      </div>`;
  });
}

function buildScenes() {
  const wrap = document.getElementById('scenes-wrap');
  scenes.forEach((s, si) => {
    let html = `<div class="scene ${si===0?'active':''}" id="scene-${si}">
      <div class="scene-label">
        <span class="scene-num">// SCENE_${s.num}</span>
        <div>
          <div class="scene-title">${s.title}</div>
          <div class="scene-desc">${s.desc}</div>
        </div>
      </div>
      <div class="arena">
        <div class="fighter-col good">
          <div class="fighter-header">
            <div class="fighter-avatar">س</div>
            <div>
              <div class="fighter-name">سامي</div>
              <div class="fighter-role">// engineering_mindset</div>
            </div>
          </div>
          <div class="fighter-body">`;
    s.sami.forEach(m => { html += buildMsg(m, 'good'); });
    html += `</div></div>
        <div class="fighter-col bad">
          <div class="fighter-header">
            <div class="fighter-avatar">ك</div>
            <div>
              <div class="fighter-name">كريم</div>
              <div class="fighter-role">// move_fast_mindset</div>
            </div>
          </div>
          <div class="fighter-body">`;
    s.karim.forEach(m => { html += buildMsg(m, 'bad'); });
    html += `</div></div></div>`;

    html += `<div class="outcome-bar">
      <div class="outcome-card good">
        <div class="outcome-icon" style="color:var(--green)">${s.outcome.good.icon}</div>
        <div><div class="outcome-title">${s.outcome.good.title}</div><div class="outcome-body">${s.outcome.good.body}</div></div>
      </div>
      <div class="outcome-card bad">
        <div class="outcome-icon" style="color:var(--red)">${s.outcome.bad.icon}</div>
        <div><div class="outcome-title">${s.outcome.bad.title}</div><div class="outcome-body">${s.outcome.bad.body}</div></div>
      </div>
    </div>`;

    html += `</div>`;
    wrap.innerHTML += html;
  });
}

function buildMsg(m, side) {
  if (m.type === 'thought') {
    return `<div class="msg thought">${m.text}</div>`;
  }
  let cls = side === 'good' ? 'chat-good' : 'chat-bad';
  let inner = m.text.replace(/\n/g, '<br>');
  if (m.code) inner += `<div class="code">${m.code}</div>`;
  if (m.tags) {
    inner += `<div class="tags">`;
    m.tags.forEach(t => {
      const [type, label] = t.split(':');
      inner += `<span class="tag tag-${type}">${label}</span>`;
    });
    inner += `</div>`;
  }
  return `<div class="msg ${cls}">${inner}</div>`;
}

function buildScoreboard() {
  const sb = document.getElementById('sb-rows');
  sbData.forEach(row => {
    sb.innerHTML += `
      <div class="sb-row">
        <div class="sb-label">${row.label}</div>
        <div class="sb-bar-wrap">
          <div class="sb-seg" style="background:var(--green);opacity:0.8;width:${row.good * 0.45}%;border-radius:3px 0 0 3px"></div>
          <div style="flex:1"></div>
          <div class="sb-seg" style="background:var(--red);opacity:0.7;width:${row.bad * 0.45}%;border-radius:0 3px 3px 0"></div>
        </div>
        <div class="sb-val" style="color:var(--green)">${row.good}%</div>
        <div class="sb-val" style="color:var(--red)">${row.bad}%</div>
      </div>`;
  });
}

function gotoScene(idx) {
  document.querySelectorAll('.scene').forEach((s,i) => s.classList.toggle('active', i === idx));
  document.querySelectorAll('.tl-step').forEach((s,i) => {
    s.classList.remove('active','done');
    if (i < idx) s.classList.add('done');
    if (i === idx) s.classList.add('active');
  });
  current = idx;
  document.getElementById('scene-counter').textContent = `${idx+1} / ${scenes.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === scenes.length-1 ? 'النتيجة النهائية →' : 'التالي →';

  if (idx === scenes.length - 1) {
    setTimeout(() => {
      document.getElementById('scoreboard').style.display = 'block';
    }, 600);
  } else {
    document.getElementById('scoreboard').style.display = 'none';
  }
}

function changeScene(dir) {
  const next = current + dir;
  if (next >= 0 && next <= scenes.length - 1) gotoScene(next);
}

buildTimeline();
buildScenes();
buildScoreboard();
gotoScene(0);
</script>
