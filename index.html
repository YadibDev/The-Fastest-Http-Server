<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Large CSS Example</title>

<style>

/* ===== Base Reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #ffffff;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== Header ===== */
header {
    padding: 40px;
    text-align: center;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    border-bottom: 2px solid rgba(255,255,255,0.2);
}

header h1 {
    font-size: 42px;
    letter-spacing: 2px;
}

header p {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.9;
}

/* ===== Navigation ===== */
nav {
    background: rgba(0,0,0,0.2);
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    padding: 8px 14px;
    border-radius: 5px;
    transition: all 0.3s ease;
}

nav a:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
}

/* ===== Main Section ===== */
main {
    flex: 1;
    padding: 60px 20px;
    text-align: center;
}

.card {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: scale(1.03);
}

button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    background: #ff9800;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffc107;
}

/* ===== Footer ===== */
footer {
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.4);
}

/* ===== Animations ===== */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    animation: fadeIn 1s ease forwards;
}

/* ===== Utility Classes (Repeated to exceed 4000 bytes) ===== */

.section-a { padding:20px; }
.section-b { padding:25px; }
.section-c { padding:30px; }
.section-d { padding:35px; }
.section-e { padding:40px; }

.text-small { font-size:12px; }
.text-medium { font-size:16px; }
.text-large { font-size:22px; }
.text-xlarge { font-size:28px; }

.bg-red { background:#e74c3c; }
.bg-blue { background:#3498db; }
.bg-green { background:#2ecc71; }
.bg-purple { background:#9b59b6; }
.bg-orange { background:#e67e22; }

.border-light { border:1px solid rgba(255,255,255,0.2); }
.border-medium { border:2px solid rgba(255,255,255,0.3); }
.border-heavy { border:3px solid rgba(255,255,255,0.4); }

.shadow-light { box-shadow:0 2px 6px rgba(0,0,0,0.2); }
.shadow-medium { box-shadow:0 5px 15px rgba(0,0,0,0.3); }
.shadow-heavy { box-shadow:0 10px 30px rgba(0,0,0,0.4); }

.round-small { border-radius:4px; }
.round-medium { border-radius:8px; }
.round-large { border-radius:16px; }

.transition-fast { transition:all 0.2s ease; }
.transition-medium { transition:all 0.4s ease; }
.transition-slow { transition:all 0.6s ease; }

/* Repeated decorative classes to increase size */

.decor-1 { background:linear-gradient(to right,#ff512f,#dd2476); }
.decor-2 { background:linear-gradient(to right,#00c6ff,#0072ff); }
.decor-3 { background:linear-gradient(to right,#f7971e,#ffd200); }
.decor-4 { background:linear-gradient(to right,#7f00ff,#e100ff); }
.decor-5 { background:linear-gradient(to right,#00b09b,#96c93d); }

.decor-6 { background:linear-gradient(to right,#ff5f6d,#ffc371); }
.decor-7 { background:linear-gradient(to right,#36d1dc,#5b86e5); }
.decor-8 { background:linear-gradient(to right,#ff9966,#ff5e62); }
.decor-9 { background:linear-gradient(to right,#2193b0,#6dd5ed); }
.decor-10 { background:linear-gradient(to right,#cc2b5e,#753a88); }

/* Extra spacing classes */

.m-1 { margin:5px; }
.m-2 { margin:10px; }
.m-3 { margin:15px; }
.m-4 { margin:20px; }
.m-5 { margin:25px; }

.p-1 { padding:5px; }
.p-2 { padding:10px; }
.p-3 { padding:15px; }
.p-4 { padding:20px; }
.p-5 { padding:25px; }

/* Additional filler styles */

.flex { display:flex; }
.flex-center { display:flex; justify-content:center; align-items:center; }
.flex-column { display:flex; flex-direction:column; }
.flex-row { display:flex; flex-direction:row; }
.flex-wrap { flex-wrap:wrap; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }

.opacity-10 { opacity:0.1; }
.opacity-25 { opacity:0.25; }
.opacity-50 { opacity:0.5; }
.opacity-75 { opacity:0.75; }
.opacity-100 { opacity:1; }

.cursor-pointer { cursor:pointer; }
.cursor-default { cursor:default; }

.z-1 { z-index:1; }
.z-10 { z-index:10; }
.z-100 { z-index:100; }

.position-relative { position:relative; }
.position-absolute { position:absolute; }
.position-fixed { position:fixed; }

.top-0 { top:0; }
.left-0 { left:0; }
.right-0 { right:0; }
.bottom-0 { bottom:0; }

/* End of large CSS */

</style>
</head>
<body>

<header>
    <h1>Large CSS Page</h1>
    <p>This page contains more than 4000 bytes of CSS inside the HTML file.</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<main>
    <div class="card">
        <h2>Welcome</h2>
        <p>This is a simple example page with embedded CSS.</p>
        <button>Click Me</button>
    </div>
</main>

<footer>
    <p>&copy; 2026 Example Page</p>
</footer>

</body>
</html>
