<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - SEGMENTATION FAULT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Fira Code', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .glitch-wrapper {
            position: relative;
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            letter-spacing: -5px;
            animation: glitch 1s linear infinite;
        }

        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-wrapper::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-wrapper::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        .message {
            font-size: 1.5rem;
            margin-top: 20px;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .details {
            font-size: 0.9rem;
            color: var(--neon-pink);
            margin-top: 10px;
            border-top: 1px solid var(--neon-pink);
            padding-top: 10px;
            display: inline-block;
        }

        .back-link {
            display: block;
            margin-top: 40px;
            color: var(--neon-cyan);
            text-decoration: none;
            border: 1px solid var(--neon-cyan);
            padding: 10px 20px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            20% { clip: rect(30px, 9999px, 40px, 0); }
            40% { clip: rect(50px, 9999px, 60px, 0); }
            60% { clip: rect(70px, 9999px, 80px, 0); }
            80% { clip: rect(90px, 9999px, 100px, 0); }
            100% { clip: rect(10px, 9999px, 20px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(60px, 9999px, 70px, 0); }
            100% { clip: rect(20px, 9999px, 30px, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch-wrapper">508</div>
        <div class="message">LOOP DETECTED</div>
        <div class="details">ITERNAL LOOP</div>
        <a href="/" class="back-link">RETURN TO ROOT_PATH</a>
    </div>
</body>
</html>
