<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv Test Page</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; background: #f9f9f9; }
        h1 { color: #2c3e50; }
        input[type="text"] { padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <h1>Webserver Core Test</h1>
    <p>Use the forms below to test your server's logic.</p>

    <div class="card">
        <h2>1. Test GET (Query String)</h2>
        <form action="/" method="GET">
            <label>Enter Name:</label>
            <input type="text" name="user" placeholder="e.g. Ashraf">
            <button type="submit">Send GET</button>
        </form>
        <p><small>Check your server logs to see the <code>_query</code> variable.</small></p>
    </div>

    <div class="card">
        <h2>2. Test POST (Message Body)</h2>
        <form action="/" method="POST">
            <label>Enter Message:</label>
            <input type="text" name="message" placeholder="Hello Server!">
            <button type="submit">Send POST</button>
        </form>
        <p><small>Check your server logs to see the <code>_body</code> content.</small></p>
    </div>

    <hr>
    <footer>
        <p>Server Status: <strong>Running</strong> | Protocol: <strong>HTTP/1.1</strong></p>
    </footer>

</body>
</html>
