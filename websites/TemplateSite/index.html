<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Page</title>
    <style>
        /* CSS: Styling the page */
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello World!</h1>
        <p id="message">Click the button to see a magic trick.</p>
        <button onclick="changeText()">Click Me!</button>
    </div>

    <script>
        // JS: Adding interactivity
        function changeText() {
            const msg = document.getElementById('message');
            msg.innerText = "✨ The text has changed! ✨";
            msg.style.color = "blue";
        }
    </script>

</body>
<script src="my.js"></script>
</html>
