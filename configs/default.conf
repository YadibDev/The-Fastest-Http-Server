server {
    listen 0.0.0.0:8082;
	root /goinfre/yadib/The-Fastest-Http-Server;
	index /index.html index.py;

	# return 301 websites;


	location /
	{ 
		allow_methods GET POST;
		cgi_pass .py /usr/bin/python3;
		autoindex on;
		client_max_body_size 1;
		upload_store /goinfre/yadib/The-Fastest-Http-Server/logs;
	}

	location /goinfre
	{
		autoindex on;
		alias goinfre/yadib/The-Fastest-Http-Server;
	}

	location /websites
	{
		alias   /goinfre/yadib/The-Fastest-Http-Server;
	}

	location / {
		autoindex on;
		root   /goinfre/yadib/The-Fastest-Http-Server;
		cgi_pass .py /usr/bin/python3;
		index /index.html/;
	}
	
	location /Utils {
		autoindex on;
		root   /goinfre/yadib/The-Fastest-Http-Server;
		index   indexs.html;
	}
	error_page 508  /errorPage/508.html;

	location /upload {
		# autoindex on;
		root   /goinfre/yadib/The-Fastest-Http-Server/;
		index   index.html /teswt2s.py ;
		upload_store /goinfre/yadib/The-Fastest-Http-Server/logs;
	}
	
	error_page 404  /errorPage/404.html;

}
