
server {
    listen 127.0.0.1:8082;
    root /home/yadib/goinfre/The-Fastest-Http-Server/websites/TemplateSite;
    index index.html index.py;
    client_max_body_size 1;

    error_page 403 400 402 403 405 404 /custom_50x.html;
    location / {
        root /home/yadib/goinfre/The-Fastest-Http-Server/websites/TemplateSite;
        autoindex on;
    }

    location /test_post
    {
        alias /home/yadib/goinfre/The-Fastest-Http-Server/websites/test_post/;
        allow_methods GET POST DELETE;
    }

    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /home/yadib/goinfre/The-Fastest-Http-Server/;
        cgi_pass .php /home/yadib/goinfre/The-Fastest-Http-Server/php;
        autoindex on;
    }
}
