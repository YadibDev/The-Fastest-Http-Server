
	server {
	    listen 0.0.0.0:8082;

	root /home/achamdao/Desktop/The-Fastest-Http-Server;

	error_page 404 /errorPage/404.html;


	location / {
		autoindex on;
		client_max_body_size 0;
		allow_methods GET POST DELETE;

		cgi_pass .py /usr/bin/python3;
		cgi_pass .php /usr/bin/php-cgi;
		upload_location /video/;
		upload_store /home/achamdao/Desktop/The-Fastest-Http-Server/video;
		# autoindex on;
	}

	location /video/
	{
		allow_methods GET DELETE;
	}

	location /forbiden/
	{
		allow_methods ;
		autoindex off;
	}

	location /google
	{
		
		allow_methods GET;
		return 302 https://www.google.com;
		
	}
	location /intra
	{
		allow_methods GET;
		return 301 https://profile.intra.42.fr/;
	}
	index index.html;

}
