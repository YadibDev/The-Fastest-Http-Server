server {
    listen 0.0.0.0:8082;
	root /goinfre/yadib/The-Fastest-Http-Server;
	index index.html index.py;
	error_page 404  /404.py;
	error_page 500  /500.py;
	# error_page 500  /500.py;


	location /
	{ 
		allow_methods GET POST;
		cgi_pass .py /usr/bin/python3;
		autoindex on;
		client_max_body_size 1;
	}
}
