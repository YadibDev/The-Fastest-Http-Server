server {
    listen 0.0.0.0:8082;
	root /goinfre/yadib/The-Fastest-Http-Server;
	index index.html index.py;
	error_page 404  /404.html;
	error_page 502  /500.py;

	location /
	{ 
		root /goinfre/yadib/The-Fastest-Http-Server;
		autoindex on;
	}
	location /500.py
	{
		alias /goinfre/yadib/The-Fastest-Http-Server/cgi-bin/;
		allow_methods GET POST;
		cgi_pass .py /usr/bin/python3;
		autoindex off;
	}
	location /cgi-bin/
	{
		alias /goinfre/yadib/The-Fastest-Http-Server/cgi-bin/;
		allow_methods GET POST;
		cgi_pass .py /usr/bin/python3;
		autoindex off;
	}
}
