
server 
{
    listen 127.0.0.1:8081;
    root /workspaces/The-Fastest-Http-Server/websites/TemplateSite/template1;
    index index.html index.py;
    client_max_body_size 1;
    error_page 403 400 402 403 405 404 /custom_50x.html;
    location / 
    {
        root /workspaces/The-Fastest-Http-Server/websites/TemplateSite/template1;
        allow_methods  POST GET;
    }
    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /workspaces/The-Fastest-Http-Server/;
        cgi_pass .py /opt/conda/bin/python;
        autoindex on;
    }
}

