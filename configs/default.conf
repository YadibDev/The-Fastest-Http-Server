server {
    # 1. Basic Connection Setup
    listen 127.0.0.1:8082;

    # 2. Global Rules (Fallback)
    root /home/yadib/ComonCore/The-Fastest-Http-Server/websites/TemplateSite;
    index index.html index.php;
    client_max_body_size 1; # 10 MB

    # 3. Error Page Customization
    error_page 404 /custom_404.html;
    error_page 500 502 503 /custom_50x.html;

    # --- Routes (Location Blocks) ---

    # A. Default Route
    location / {
        allow_methods GET;
        autoindex on ;
    }

    # B. Directory Listing & Uploads
    location /test {
        allow_methods GET POST DELETE;
        root /home/yadib/ComonCore/The-Fastest-Http-Server/websites/;
        autoindex on;       # Shows file list if no index found
        
        return 301 https://www.google.com;
    }

    # C. Redirection
    location /google {
        return 301 https://www.google.com/;
    }

    # D. CGI Execution (The complex part)
    location /cgi-bin {
        root /home/yadib/ComonCore/The-Fastest-Http-Server/websites/TemplateSite;
        allow_methods GET POST;
        index time.py time.html;
        
        # Mapping extension -> Executable
        cgi_pass .py /usr/bin/python3;
    }
    
    # E. The weird "kapouet" example from subject
    location /kapouet {
        root /home/yadib/ComonCore/The-Fastest-Http-Server/websites/TemplateSite;
    }
}