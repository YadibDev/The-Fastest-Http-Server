
server {
    listen 127.0.0.1:8082;
    root /workspaces/The-Fastest-Http-Server/websites/TemplateSite;
    index index.html index.py;
    client_max_body_size 1;

    error_page 403 400 402 403 405 404 =301 http://gemini.google.com/;
    location / {
        root /workspaces/The-Fastest-Http-Server/websites/TemplateSite;
        autoindex on;
    }

    location /test_post
    {
        alias /workspaces/The-Fastest-Http-Server/websites/TemplateSite/test_post;
        allow_methods GET POST DELETE;
    }

    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /workspaces/The-Fastest-Http-Server;
        cgi_pass .php /usr/bin/php;
        autoindex on;
    }
}

