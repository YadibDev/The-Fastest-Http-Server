server {
    listen 127.0.0.1:8081;
    # تأكد من أن المسار صحيح وإملائي
    root /workspaces/The-Fastest-Http-Server; 
    
    # استخدام ملف سجل واحد وتحديد حجم منطقي
    # access_log log_8080.txt;
    client_max_body_size 10m;
    location / {
        autoindex on;
        allow_methods GET;
        # index testCase.php index2.html;
    }
#    location /test {
