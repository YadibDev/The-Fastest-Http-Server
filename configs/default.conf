
server {
    listen 127.0.0.1:8082;
    root /websites/TemplateSite/template2;
    index index.html index.py;
    client_max_body_size 1;
    error_page 403 400 402 403 405 404 /custom_50x.html;
    location / {
        root /websites/TemplateSite/template2;
        autoindex on;
    }

    location /test_post
    {
        alias /websites/TemplateSite/template2;
        allow_methods GET POST DELETE;
    }
    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /websites/TemplateSite/template2;
        cgi_pass .py /opt/conda/bin/python;
        autoindex on;
    }
}
