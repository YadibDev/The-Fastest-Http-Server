
server {
	listen 0.0.0.0:8082;

	root ./;
	error_page 404 /errorPage/404.html;

	location / {
		index index.html;
		autoindex on;
		client_max_body_size 10M;
		allow_methods GET POST DELETE;
		cgi_pass .pl /usr/bin/perl;
		cgi_pass .py /usr/bin/python3;

		upload_location /uploads/;
		upload_store ./;
	}



}
