
server {
    listen 127.0.0.1:8081;
    root /goinfre/yadib/The-Fastest-Http-Server/websites/TemplateSite/template1;
    index index.html index.py;
    client_max_body_size 1;
    error_page 403 400 402 403 405 404 /custom_50x.html;
    location / {
        root /goinfre/yadib/The-Fastest-Http-Server/websites/TemplateSite/template1;
        autoindex on;
    }

    location /test_post
    {
        alias /goinfre/yadib/The-Fastest-Http-Server/websites/test_post/;
        allow_methods  POST ;
    }

    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /goinfre/yadib/The-Fastest-Http-Server/;
        cgi_pass .py  /usr/bin/python3;
        autoindex on;
    }
}

