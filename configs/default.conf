server {
    listen 127.0.0.1:8082;
	error_page   500 502 503 504  /50x.html;

	error_page  400 404 405 403 402 /;

	# return 301 websites;

	location /test2.py {
		root   /Volumes/mjaouchi/webservNow;
		index  /websites;
	}

	location /websites
	{
		root   /Volumes/mjaouchi/webservNow;
		index  /test2.py/;
	}

	location / {
		# autoindex on;
		root   /Volumes/mjaouchi/webservNow;
		index   index.html /teswt2s.py ;
	}
	
	# redirect server error pages to the static page /50x.html
	#
	location = /50x.html {
		root   /Volumes/mjaouchi/webservNow;
	}
}

