server {
    listen 127.0.0.1:8082;

    root /home/achamdao/Desktop/The-Fastest-Http-Server/websites/TemplateSite/template2/;
    index index.html index.php;
    client_max_body_size 1;
    error_page 403 400 402 403 405 404 /custom_50x.html;
    location / {
        # cgi_pass .php /usr/bin/php-cgi;

        root /home/achamdao/Desktop/The-Fastest-Http-Server/websites/TemplateSite/template2/;
        allow_methods GET POST DELETE;
    }

    location /cgi-bin
    {
        root /home/achamdao/Desktop/The-Fastest-Http-Server/;
        cgi_pass .py /usr/bin/python3;
        # cgi_pass .php /usr/bin/php;
        allow_methods GET POST DELETE;
    }
}