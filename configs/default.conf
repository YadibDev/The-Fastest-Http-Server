#     root /workspaces/The-Fastest-Http-Server;
#         return 200 "Hello from /test endpoint!";
#         # index index.html testCase.py;
#     }

    location /test
    {
        return  301 "Hello from /test endpoint!";
        cgi_pass .py /usr/local/python/3.12.1/bin/python;
    }
}

