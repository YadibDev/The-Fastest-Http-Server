server {
    listen 127.0.0.1:8082;
	root /goinfre/yadib/The-Fastest-Http-Server;
	index index.html index.py;
	error_page 404  /404.html;

	error_page  400 404 405 403 402 /;


	client_max_body_size 10000;
	# return 301 websites;

	location /test2.py {
		root   /Volumes/mjaouchi/webservNow;
		index  /websites;
	}

	location /websites
	{
		alias   /Volumes/mjaouchi/webservNow;
	}

	location / {
		autoindex on;
		root   /Volumes/mjaouchi/Notfound;
		index   notexist ;
	}
	
	location /upload {
		# autoindex on;
		alias   /Volumes/mjaouchi/webservNow;
		index   index.html /teswt2s.py ;
	}
	
	# redirect server error pages to the static page /50x.html
	#
	location = /50x.html {
		root   /Volumes/mjaouchi/webservNow;
	}
}
