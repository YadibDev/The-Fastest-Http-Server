
server {
    # 1. Basic Connection Setup
    listen 127.0.0.1:8082;

    # 2. Global Rules (Fallback)
    root workspaces/The-Fastest-Http-Server/websites/TemplateSite;
    index index.html index.py;
    client_max_body_size 1; # 10 MB

    # 3. Error Page Customization
    error_page 404 /custom_404.html;
    error_page 500 502 503 /cgi-bin/custom_50x.py;

    # --- Routes (Location Blocks) ---

    # A. Default Route
    location / {
        root /workspaces/The-Fastest-Http-Server/websites/TemplateSite;
        # cgi_pass /usr/local/php /workspaces/The-Fastest-Http-Server/cgi-bin/script.php;
        autoindex on;
    }


    location /cgi-bin
    {
        allow_methods GET POST DELETE;
        root /workspaces/The-Fastest-Http-Server/;
        cgi_pass .php /usr/local/php/8.3.14/bin/php;
    }

    # B. Directory Listing & Uploads
    location /test {
        allow_methods GET POST DELETE;
        root /workspaces/The-Fastest-Http-Server/websites/TemplateSite;
        autoindex on;       # Shows file list if no index found
    }
}
