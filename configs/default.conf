
server {
	listen 0.0.0.0:8082;

	root /goinfre/yadib/website;

	error_page 404 /errorPage/404.html;


	location / {
		autoindex on;
		client_max_body_size 0;
		allow_methods GET POST DELETE;

		cgi_pass .php /usr/bin/php-cgi;
		cgi_pass .pl /usr/bin/perl;
		cgi_pass .py /usr/bin/python3;

		upload_location /upload/;
		upload_store /goinfre/yadib/website;
		# autoindex on;
	}

	location /upload/
	{
		allow_methods GET;
	}

	location /forbiden/
	{
		autoindex off;
	}

	location /google
	{
		allow_methods GET;
		return 302 https://www.google.com;
		
	}
	location /intra
	{
		allow_methods GET;
		return 301 https://profile.intra.42.fr/;
	}
	index index.html;

}
