	error_page 500  /errorPage/500.html;
	error_page 508  /errorPage/508.html;


	client_max_body_size 100;
	# return 301 websites;

	location /test2.py {
		root   /home/mjaouchi/Desktop/Webserv;
		# index  /websites;
	}

	location /goinfre
	{
		alias /goinfre/mjaouchi;
	}

	location /websites
	{
		alias   /home/mjaouchi/Desktop/Webserv;
	}

	location / {
		autoindex on;
		root   /home/mjaouchi/Desktop/Webserv;
		cgi_pass .py /usr/bin/python;
