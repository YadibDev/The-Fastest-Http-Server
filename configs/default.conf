
server {
    listen 0.0.0.0:8081;
    listen 0.0.0.0:8082;
	root /goinfre/yadib/The-Fastest-Http-Server;
	index  index.py;
	client_max_body_size 0g;
	# error_page 404 /;
	# return 301 websites;
	
	location / 
	{
		autoindex on;
		allow_methods GET POST DELETE;
  
		cgi_pass .py /usr/bin/python3;
		index index.html;
		upload_location /video/;
		upload_store   /goinfre/yadib/The-Fastest-Http-Server/video/; 
	}
	location /video/
	{
		allow_methods GET POST DELETE;
		root /goinfre/yadib/The-Fastest-Http-Server/video/;
	}
}